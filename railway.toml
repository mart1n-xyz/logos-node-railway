[build]
# Bump NODE_VERSION and CIRCUITS_VERSION here when new releases are published.
# If circuit files are released on a different tag, set CIRCUITS_VERSION separately.
dockerfilePath = "Dockerfile"

[build.args]
NODE_VERSION     = "0.2.1"
CIRCUITS_VERSION = "0.4.1"

[deploy]
# Health check hits the dashboard (which is the public-facing port)
healthcheckPath    = "/"
healthcheckTimeout = 300          # generous — node needs time to sync on first boot
restartPolicyType  = "on_failure"

[[deploy.envVars]]
name        = "PORT"
value       = "3001"
description = "Web dashboard port (Railway injects $PORT and routes public traffic here)"

[[deploy.envVars]]
name        = "NODE_API_PORT"
value       = "8080"
description = "Internal port for the node's HTTP API (not publicly exposed)"

[[deploy.envVars]]
name        = "API_PORT"
value       = "8080"
description = "Port the node's HTTP API listens on (keep in sync with NODE_API_PORT)"

[[deploy.envVars]]
name        = "DATA_DIR"
value       = "/data"
description = "Path to the persistent volume (config + chain state)"

[[deploy.envVars]]
name        = "DASHBOARD_PASSWORD"
value       = ""
description = "Optional: set to enable basic auth on the dashboard (username: admin). Leave empty for public access."

[[deploy.envVars]]
name  = "BOOTSTRAP_PEERS"
value = "/ip4/65.109.51.37/udp/3000/quic-v1/p2p/12D3KooWL7a8LBbLRYnabptHPFBCmAs49Y7cVMqvzuSdd43tAJk8 /ip4/65.109.51.37/udp/3001/quic-v1/p2p/12D3KooWPLeAcachoUm68NXGD7tmNziZkVeMmeBS5NofyukuMRJh /ip4/65.109.51.37/udp/3002/quic-v1/p2p/12D3KooWKFNe4gS5DcCcRUVGdMjZp3fUWu6q6gG5R846Ui1pccHD /ip4/65.109.51.37/udp/3003/quic-v1/p2p/12D3KooWAnriLgXyQnGTYz1zPWPkQL3rthTKYLzuAP7MMnbgsxzR"
description = "Space-separated bootstrap peer multiaddrs — update for each new release"

[[volumes]]
mountPath = "/data"
